openapi: 3.0.3
info:
  title: Tomado API
  description: |
    포모도로 타이머 + 투두리스트 + 데일리로그 + 회고록을 통합한 생산성 기록 서비스

    ## 인증
    보호된 엔드포인트는 `Authorization: Bearer {access_token}` 헤더가 필요합니다.
    Access Token 만료 시 `/auth/refresh`로 재발급하세요.

    ## 삭제 정책
    완료된 투두(`completed_at IS NOT NULL`)는 삭제 불가 — 기록 보존 원칙.
  version: 1.0.0
  contact:
    name: Tomado Team

servers:
  - url: https://api.tomado.io/api/v1
    description: Production

tags:
  - name: Auth
    description: 인증 (회원가입 / 로그인 / 토큰 재발급 / 로그아웃)
  - name: Users
    description: 사용자 프로필 및 앱 설정
  - name: Todos
    description: 투두리스트 관리
  - name: Pomodoro
    description: 포모도로 세션 기록
  - name: DailyLogs
    description: 데일리 로그 (마크다운 일일 기록)
  - name: RetroLogs
    description: 회고 로그 (4종 템플릿)
  - name: Stats
    description: 집중 통계 (히트맵 / 달력 / 차트)

# ─────────────────────────────────────────
# Security
# ─────────────────────────────────────────
securitySchemes: {}

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ── 공통 응답 ──────────────────────────
  responses:
    Unauthorized:
      description: 유효하지 않거나 만료된 Access Token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: UNAUTHORIZED
              message: 유효하지 않거나 만료된 Access Token입니다.

    Forbidden:
      description: 다른 사용자의 리소스 접근 시도
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: FORBIDDEN
              message: 본인의 리소스만 접근할 수 있습니다.

    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: NOT_FOUND
              message: 해당 리소스를 찾을 수 없습니다.

  # ── 공통 스키마 ────────────────────────
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: 요청 파라미터가 올바르지 않습니다.
            field:
              type: string
              description: 유효성 검사 오류 시만 포함
              example: login_id

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        login_id:
          type: string
          example: devjohn
        nickname:
          type: string
          example: 존개발
        avatar_url:
          type: string
          nullable: true
          example: https://cdn.tomado.io/avatars/devjohn.png
        created_at:
          type: string
          format: date-time
          example: '2026-01-15T09:00:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-06-01T12:00:00Z'

    UserSettings:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
        user_id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        focus_min:
          type: integer
          minimum: 1
          maximum: 120
          example: 25
        short_break_min:
          type: integer
          minimum: 1
          maximum: 30
          example: 5
        long_break_min:
          type: integer
          minimum: 1
          maximum: 60
          example: 15
        sessions_per_set:
          type: integer
          minimum: 1
          maximum: 10
          example: 4
        auto_carry_todo:
          type: boolean
          example: true
        updated_at:
          type: string
          format: date-time
          example: '2026-06-01T12:00:00Z'

    Todo:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: c3d4e5f6-a7b8-9012-cdef-123456789012
        user_id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        title:
          type: string
          example: API 명세서 작성
        description:
          type: string
          nullable: true
          example: 인증/투두/포모도로 엔드포인트 정의
        assigned_date:
          type: string
          format: date
          example: '2026-06-10'
        sort_order:
          type: number
          format: float
          example: 3.0
        completed_at:
          type: string
          format: date-time
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
          example: '2026-06-10T09:00:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-06-10T09:00:00Z'

    PomodoroSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: d4e5f6a7-b8c9-0123-def0-234567890123
        user_id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        type:
          type: string
          enum: [focus, short_break, long_break]
          example: focus
        status:
          type: string
          enum: [completed, cancelled]
          nullable: true
          example: completed
        actual_sec:
          type: integer
          nullable: true
          example: 1500
        focus_date:
          type: string
          format: date
          example: '2026-06-10'
        started_at:
          type: string
          format: date-time
          example: '2026-06-10T09:00:00Z'
        ended_at:
          type: string
          format: date-time
          nullable: true
          example: '2026-06-10T09:25:00Z'
        created_at:
          type: string
          format: date-time
          example: '2026-06-10T09:00:00Z'

    DailyLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: f6a7b8c9-d0e1-2345-f012-456789012345
        user_id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        log_date:
          type: string
          format: date
          example: '2026-06-10'
        content:
          type: string
          example: "## 오늘 한 일\n- API 명세서 작성 완료\n- ERD 리뷰"
        tags:
          type: array
          items:
            type: string
          example: [backend, docs]
        is_dirty:
          type: boolean
          example: false
        draft_content:
          type: string
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
          example: '2026-06-10T09:00:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-06-10T18:00:00Z'

    DailyLogSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: f6a7b8c9-d0e1-2345-f012-456789012345
        log_date:
          type: string
          format: date
          example: '2026-06-10'
        tags:
          type: array
          items:
            type: string
          example: [backend, docs]
        has_retro_log:
          type: boolean
          example: true

    RetroLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: b8c9d0e1-f2a3-4567-0123-678901234567
        user_id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        daily_log_id:
          type: string
          format: uuid
          example: f6a7b8c9-d0e1-2345-f012-456789012345
        retro_date:
          type: string
          format: date
          example: '2026-06-10'
        template_type:
          type: string
          enum: [Tech, Decision, Communication, Emotion]
          example: Tech
        content:
          type: object
          description: 템플릿 항목별 텍스트 (template_type에 따라 키 구조가 다름)
          example:
            what_went_well: API 명세서 설계가 예상보다 빨리 완료됨
            what_to_improve: 에러 케이스 예시 작성이 미흡했음
            action_items: 다음 PR 전에 에러 시나리오 테스트 케이스 추가
        is_dirty:
          type: boolean
          example: false
        draft_content:
          type: object
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
          example: '2026-06-10T19:00:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-06-10T19:30:00Z'

    DailyFocusStat:
      type: object
      properties:
        focus_date:
          type: string
          format: date
          example: '2026-06-10'
        total_focus_sec:
          type: integer
          example: 7200
        completed_sessions:
          type: integer
          example: 4
        completed_todos:
          type: integer
          example: 6
        has_daily_log:
          type: boolean
          example: true
        has_retro_log:
          type: boolean
          example: true

    AuthTokens:
      type: object
      properties:
        access_token:
          type: string
          example: eyJhbGci...
        refresh_token:
          type: string
          example: eyJhbGci...

# ─────────────────────────────────────────
# Paths
# ─────────────────────────────────────────
paths:

  # ══════════════════════════════════════
  # 1. AUTH
  # ══════════════════════════════════════
  /auth/register:
    post:
      tags: [Auth]
      summary: 회원가입
      description: 신규 회원 가입. 성공 시 `users` + `user_settings` 레코드 자동 생성.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login_id, password, nickname]
              properties:
                login_id:
                  type: string
                  minLength: 4
                  maxLength: 20
                  example: devjohn
                  description: 로그인 ID (영문+숫자, 4~20자)
                password:
                  type: string
                  minLength: 8
                  example: P@ssw0rd!
                  description: 비밀번호 (8자 이상, 영문+숫자+특수문자)
                nickname:
                  type: string
                  minLength: 2
                  maxLength: 20
                  example: 존개발
                  description: 서비스 내 닉네임 (2~20자)
      responses:
        '201':
          description: 회원가입 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AuthTokens'
                  - type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
              example:
                access_token: eyJhbGci...
                refresh_token: eyJhbGci...
                user:
                  id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  login_id: devjohn
                  nickname: 존개발
                  avatar_url: null
                  created_at: '2026-01-15T09:00:00Z'
        '400':
          description: 유효성 검사 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: login_id는 4~20자 영문+숫자여야 합니다.
                  field: login_id
        '409':
          description: 이미 사용 중인 login_id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: CONFLICT
                  message: 이미 사용 중인 login_id입니다.

  /auth/login:
    post:
      tags: [Auth]
      summary: 로그인
      description: Supabase Auth 검증 후 Access / Refresh Token 발급.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login_id, password]
              properties:
                login_id:
                  type: string
                  example: devjohn
                password:
                  type: string
                  example: P@ssw0rd!
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AuthTokens'
                  - type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
              example:
                access_token: eyJhbGci...
                refresh_token: eyJhbGci...
                user:
                  id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  login_id: devjohn
                  nickname: 존개발
                  avatar_url: null
                  created_at: '2026-01-15T09:00:00Z'
        '401':
          description: 아이디 또는 비밀번호 불일치
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: UNAUTHORIZED
                  message: 아이디 또는 비밀번호가 올바르지 않습니다.

  /auth/refresh:
    post:
      tags: [Auth]
      summary: 토큰 재발급
      description: Refresh Token으로 Access Token 재발급 (Rotation). 기존 Refresh Token은 즉시 폐기됨.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  example: eyJhbGci...
      responses:
        '200':
          description: 새 토큰 발급 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
              example:
                access_token: eyJhbGci...새로운토큰
                refresh_token: eyJhbGci...새로운토큰
        '401':
          description: Refresh Token 만료 또는 무효
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: UNAUTHORIZED
                  message: Refresh Token이 만료되었거나 유효하지 않습니다.

  /auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃
      description: Supabase에서 현재 세션의 Refresh Token을 폐기.
      security:
        - BearerAuth: []
      responses:
        '204':
          description: 로그아웃 성공 (본문 없음)
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ══════════════════════════════════════
  # 2. USERS
  # ══════════════════════════════════════
  /users/me:
    get:
      tags: [Users]
      summary: 내 프로필 조회
      description: 현재 로그인한 사용자의 프로필 정보 조회.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 프로필 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      tags: [Users]
      summary: 프로필 수정
      description: 닉네임 또는 아바타 URL 수정. 변경할 필드만 전송 가능.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                  minLength: 2
                  maxLength: 20
                  example: 존시니어
                avatar_url:
                  type: string
                  example: https://cdn.tomado.io/avatars/new.png
            example:
              nickname: 존시니어
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: 유효성 검사 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: 닉네임은 2~20자 이내여야 합니다.
                  field: nickname
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/settings:
    get:
      tags: [Users]
      summary: 앱 설정 조회
      description: 사용자 앱 설정 (포모도로 시간, 자동이월 등) 조회.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 설정 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettings'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      tags: [Users]
      summary: 앱 설정 수정
      description: 앱 설정 변경. 변경할 필드만 전송 가능.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                focus_min:
                  type: integer
                  minimum: 1
                  maximum: 120
                  example: 50
                short_break_min:
                  type: integer
                  minimum: 1
                  maximum: 30
                  example: 10
                long_break_min:
                  type: integer
                  minimum: 1
                  maximum: 60
                  example: 15
                sessions_per_set:
                  type: integer
                  minimum: 1
                  maximum: 10
                  example: 4
                auto_carry_todo:
                  type: boolean
                  example: false
            example:
              focus_min: 50
              short_break_min: 10
              auto_carry_todo: false
      responses:
        '200':
          description: 설정 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettings'
        '400':
          description: 유효성 검사 실패 (범위 초과 등)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: focus_min은 1~120 범위여야 합니다.
                  field: focus_min
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ══════════════════════════════════════
  # 3. TODOS
  # ══════════════════════════════════════
  /todos:
    get:
      tags: [Todos]
      summary: 날짜별 투두 목록 조회
      description: |
        특정 날짜의 투두 목록 조회. `sort_order` 기준 오름차순 정렬.
        과거 날짜 조회 시 완료 투두(`completed_at IS NOT NULL`)가 자연스럽게 포함됨.
      security:
        - BearerAuth: []
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-06-10'
          description: 조회 날짜 (YYYY-MM-DD)
      responses:
        '200':
          description: 투두 목록 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Todo'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Todos]
      summary: 투두 생성
      description: 새 투두 생성. `sort_order`는 기존 마지막 값 + 1.0으로 자동 계산.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, assigned_date]
              properties:
                title:
                  type: string
                  maxLength: 200
                  example: API 명세서 작성
                description:
                  type: string
                  example: 인증/투두/포모도로 엔드포인트 정의
                assigned_date:
                  type: string
                  format: date
                  example: '2026-06-10'
      responses:
        '201':
          description: 투두 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        '400':
          description: 필수 필드 누락 또는 날짜 형식 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: assigned_date는 필수 항목입니다.
                  field: assigned_date
        '401':
          $ref: '#/components/responses/Unauthorized'

  /todos/{id}:
    patch:
      tags: [Todos]
      summary: 투두 수정
      description: 투두 내용 수정. 변경할 필드만 전송.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: c3d4e5f6-a7b8-9012-cdef-123456789012
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: API 명세서 작성 (수정)
                description:
                  type: string
                  example: 회고 엔드포인트 추가 정의
                assigned_date:
                  type: string
                  format: date
                  example: '2026-06-10'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Todos]
      summary: 투두 삭제
      description: |
        **미완료 투두(`completed_at IS NULL`)만 삭제 가능.**
        완료된 투두는 "그날 한 일"의 기록이므로 삭제 불가 — `400` 반환.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 삭제 성공 (본문 없음)
        '400':
          description: 완료된 투두는 삭제 불가
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: 완료된 투두는 삭제할 수 없습니다. 완료 기록은 보존됩니다.
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /todos/{id}/complete:
    patch:
      tags: [Todos]
      summary: 투두 완료 토글
      description: |
        완료/미완료 토글.
        - `completed: true` → `completed_at = 현재시각`, `daily_focus_stats.completed_todos +1`
        - `completed: false` → `completed_at = null`, `daily_focus_stats.completed_todos -1`
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [completed]
              properties:
                completed:
                  type: boolean
                  example: true
                  description: true = 완료 처리, false = 미완료 취소
      responses:
        '200':
          description: 토글 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
              examples:
                completed:
                  summary: 완료 처리 시
                  value:
                    id: c3d4e5f6-a7b8-9012-cdef-123456789012
                    title: API 명세서 작성
                    assigned_date: '2026-06-10'
                    sort_order: 3.0
                    completed_at: '2026-06-10T14:30:00Z'
                    updated_at: '2026-06-10T14:30:00Z'
                uncompleted:
                  summary: 완료 취소 시
                  value:
                    id: c3d4e5f6-a7b8-9012-cdef-123456789012
                    title: API 명세서 작성
                    assigned_date: '2026-06-10'
                    sort_order: 3.0
                    completed_at: null
                    updated_at: '2026-06-10T14:35:00Z'
        '404':
          $ref: '#/components/responses/NotFound'

  /todos/{id}/reorder:
    patch:
      tags: [Todos]
      summary: 투두 순서 변경
      description: |
        드래그앤드롭 후 `sort_order` 업데이트.
        A(1.0)~B(2.0) 사이 삽입 시 midpoint(1.5) 사용. 범위 부족 시 전체 재정렬 실행.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prev_order:
                  type: number
                  format: float
                  example: 1.0
                  description: 앞 항목의 sort_order (맨 앞이면 생략)
                next_order:
                  type: number
                  format: float
                  example: 2.0
                  description: 뒤 항목의 sort_order (맨 뒤면 생략)
            example:
              prev_order: 1.0
              next_order: 2.0
      responses:
        '200':
          description: 순서 변경 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
              example:
                id: c3d4e5f6-a7b8-9012-cdef-123456789012
                title: API 명세서 작성
                sort_order: 1.5
                updated_at: '2026-06-10T11:00:00Z'
        '400':
          description: prev_order >= next_order 충돌
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: prev_order는 next_order보다 작아야 합니다.

  # ══════════════════════════════════════
  # 4. POMODORO
  # ══════════════════════════════════════
  /pomodoro/sessions:
    post:
      tags: [Pomodoro]
      summary: 세션 시작
      description: 포모도로 세션 시작 기록 생성.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, focus_date, started_at]
              properties:
                type:
                  type: string
                  enum: [focus, short_break, long_break]
                  example: focus
                focus_date:
                  type: string
                  format: date
                  example: '2026-06-10'
                started_at:
                  type: string
                  format: date-time
                  example: '2026-06-10T09:00:00Z'
      responses:
        '201':
          description: 세션 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PomodoroSession'
              example:
                id: d4e5f6a7-b8c9-0123-def0-234567890123
                user_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                type: focus
                status: null
                actual_sec: null
                focus_date: '2026-06-10'
                started_at: '2026-06-10T09:00:00Z'
                ended_at: null
                created_at: '2026-06-10T09:00:00Z'
        '400':
          description: type 값 오류 또는 날짜 형식 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: type은 focus, short_break, long_break 중 하나여야 합니다.
                  field: type
        '401':
          $ref: '#/components/responses/Unauthorized'

    get:
      tags: [Pomodoro]
      summary: 세션 이력 조회
      description: 기간별 포모도로 세션 이력 조회.
      security:
        - BearerAuth: []
      parameters:
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-06-01'
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-06-30'
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [focus, short_break, long_break]
          description: 세션 종류 필터
      responses:
        '200':
          description: 세션 목록 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PomodoroSession'
        '400':
          description: 날짜 형식 오류 또는 start_date > end_date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /pomodoro/sessions/{id}/end:
    patch:
      tags: [Pomodoro]
      summary: 세션 종료
      description: |
        세션 종료. `actual_sec` 저장 후 `daily_focus_stats` UPSERT.
        `focus` 타입만 `total_focus_sec`, `completed_sessions` 집계.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status, actual_sec, ended_at]
              properties:
                status:
                  type: string
                  enum: [completed, cancelled]
                  example: completed
                actual_sec:
                  type: integer
                  example: 1500
                  description: 실제 경과 시간 (초)
                ended_at:
                  type: string
                  format: date-time
                  example: '2026-06-10T09:25:00Z'
            example:
              status: completed
              actual_sec: 1500
              ended_at: '2026-06-10T09:25:00Z'
      responses:
        '200':
          description: 세션 종료 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PomodoroSession'
        '400':
          description: status 값 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: status는 completed 또는 cancelled여야 합니다.
                  field: status
        '404':
          $ref: '#/components/responses/NotFound'

  # ══════════════════════════════════════
  # 5. DAILY LOGS
  # ══════════════════════════════════════
  /daily-logs:
    get:
      tags: [DailyLogs]
      summary: 날짜별 데일리 로그 조회
      description: 특정 날짜의 데일리 로그 조회. 해당 날짜 로그가 없으면 404 반환.
      security:
        - BearerAuth: []
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-06-10'
      responses:
        '200':
          description: 로그 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyLog'
        '404':
          description: 해당 날짜 로그 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NOT_FOUND
                  message: 2026-06-10 날짜의 데일리 로그가 존재하지 않습니다.
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [DailyLogs]
      summary: 데일리 로그 생성
      description: 데일리 로그 생성. 성공 시 `daily_focus_stats.has_daily_log = true` UPSERT.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [log_date, content]
              properties:
                log_date:
                  type: string
                  format: date
                  example: '2026-06-10'
                content:
                  type: string
                  example: "## 오늘 한 일\n- API 명세서 작성 완료"
                tags:
                  type: array
                  items:
                    type: string
                  example: [backend, docs]
      responses:
        '201':
          description: 로그 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyLog'
        '409':
          description: 해당 날짜 로그 이미 존재
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: CONFLICT
                  message: 2026-06-10 날짜의 데일리 로그가 이미 존재합니다.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /daily-logs/list:
    get:
      tags: [DailyLogs]
      summary: 기간별 로그 목록 조회
      description: 기간 내 데일리 로그 목록 조회 (달력 배지, 이력 페이지용). `content` 필드 제외하여 경량화.
      security:
        - BearerAuth: []
      parameters:
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-06-01'
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-06-30'
      responses:
        '200':
          description: 로그 요약 목록 반환
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyLogSummary'
              example:
                - id: f6a7b8c9-d0e1-2345-f012-456789012345
                  log_date: '2026-06-10'
                  tags: [backend, docs]
                  has_retro_log: true
                - id: a7b8c9d0-e1f2-3456-0123-567890123456
                  log_date: '2026-06-11'
                  tags: [frontend]
                  has_retro_log: false
        '401':
          $ref: '#/components/responses/Unauthorized'

  /daily-logs/{id}:
    patch:
      tags: [DailyLogs]
      summary: 데일리 로그 수정
      description: |
        데일리 로그 수정. debounce autoSave 시 `is_dirty=false`, 실패 시 `draft_content`에 임시본 저장.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  example: "## 오늘 한 일\n- API 명세서 작성 완료\n- 팀 코드 리뷰"
                tags:
                  type: array
                  items:
                    type: string
                  example: [backend, review]
                is_dirty:
                  type: boolean
                  example: false
                  description: 저장 완료 시 false 전송
                draft_content:
                  type: string
                  nullable: true
                  example: null
                  description: 자동저장 실패 시 복구용 임시본
            examples:
              autoSaveSuccess:
                summary: autoSave 성공 시
                value:
                  content: "## 오늘 한 일\n- API 명세서 작성 완료\n- 팀 코드 리뷰"
                  tags: [backend, review]
                  is_dirty: false
              autoSaveFail:
                summary: autoSave 실패 시 (draft 저장)
                value:
                  is_dirty: true
                  draft_content: "## 오늘 한 일\n- 임시 저장본..."
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyLog'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [DailyLogs]
      summary: 데일리 로그 삭제
      description: 데일리 로그 삭제. `daily_focus_stats.has_daily_log = false` UPSERT.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 삭제 성공 (본문 없음)
        '403':
          description: 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: FORBIDDEN
                  message: 본인의 데일리 로그만 삭제할 수 있습니다.
        '404':
          $ref: '#/components/responses/NotFound'

  # ══════════════════════════════════════
  # 6. RETRO LOGS
  # ══════════════════════════════════════
  /retro-logs:
    get:
      tags: [RetroLogs]
      summary: 회고 조회
      description: 특정 날짜 또는 `daily_log_id`로 회고 조회. 두 파라미터 중 하나 필수.
      security:
        - BearerAuth: []
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
          example: '2026-06-10'
          description: date 또는 daily_log_id 중 하나 필수
        - name: daily_log_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          example: f6a7b8c9-d0e1-2345-f012-456789012345
      responses:
        '200':
          description: 회고 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetroLog'
        '404':
          description: 해당 날짜 회고 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NOT_FOUND
                  message: 해당 날짜의 회고가 존재하지 않습니다.
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [RetroLogs]
      summary: 회고 생성
      description: 회고 생성. 성공 시 `daily_focus_stats.has_retro_log = true` UPSERT.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [daily_log_id, retro_date, template_type, content]
              properties:
                daily_log_id:
                  type: string
                  format: uuid
                  example: f6a7b8c9-d0e1-2345-f012-456789012345
                retro_date:
                  type: string
                  format: date
                  example: '2026-06-10'
                template_type:
                  type: string
                  enum: [Tech, Decision, Communication, Emotion]
                  example: Tech
                content:
                  type: object
                  example:
                    what_went_well: API 명세서 설계가 예상보다 빨리 완료됨
                    what_to_improve: 에러 케이스 예시 작성이 미흡했음
                    action_items: 다음 PR 전에 에러 시나리오 테스트 케이스 추가
      responses:
        '201':
          description: 회고 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetroLog'
        '400':
          description: template_type 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: daily_log_id 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: 해당 날짜 회고 이미 존재
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: CONFLICT
                  message: 2026-06-10 날짜의 회고가 이미 존재합니다.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /retro-logs/{id}:
    patch:
      tags: [RetroLogs]
      summary: 회고 수정
      description: 회고 내용 수정. `is_dirty` / `draft_content` 자동저장 패턴은 데일리로그와 동일.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: object
                  example:
                    what_went_well: API 명세서 설계 완료 + 팀 공유까지 완료
                    what_to_improve: 에러 케이스 예시 작성 보완 필요
                    action_items: 내일 오전 중 테스트 코드 추가
                is_dirty:
                  type: boolean
                  example: false
                draft_content:
                  type: object
                  nullable: true
                  example: null
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetroLog'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [RetroLogs]
      summary: 회고 삭제
      description: 회고 삭제. `daily_focus_stats.has_retro_log = false` UPSERT.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 삭제 성공 (본문 없음)
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ══════════════════════════════════════
  # 7. STATS
  # ══════════════════════════════════════
  /stats/heatmap:
    get:
      tags: [Stats]
      summary: 히트맵 데이터 조회
      description: GitHub 잔디 스타일 히트맵용 일별 집중 시간 데이터 조회. 최대 365일 조회 가능.
      security:
        - BearerAuth: []
      parameters:
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-01-01'
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-06-30'
          description: 최대 start + 365일
      responses:
        '200':
          description: 히트맵 데이터 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyFocusStat'
        '400':
          description: 날짜 범위 365일 초과 또는 형식 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: 조회 기간은 최대 365일입니다.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /stats/calendar:
    get:
      tags: [Stats]
      summary: 달력 배지 데이터 조회
      description: 월간 달력 배지 (데일리로그/회고 작성 여부, 포모도로 수) 조회.
      security:
        - BearerAuth: []
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
          example: 2026
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
          example: 6
      responses:
        '200':
          description: 달력 데이터 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyFocusStat'
              example:
                - focus_date: '2026-06-01'
                  total_focus_sec: 5400
                  completed_sessions: 3
                  completed_todos: 4
                  has_daily_log: true
                  has_retro_log: false
                - focus_date: '2026-06-10'
                  total_focus_sec: 7200
                  completed_sessions: 4
                  completed_todos: 6
                  has_daily_log: true
                  has_retro_log: true
        '400':
          description: month 범위 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: month는 1~12 사이여야 합니다.
                  field: month
        '401':
          $ref: '#/components/responses/Unauthorized'

  /stats/summary:
    get:
      tags: [Stats]
      summary: 대시보드 요약 조회
      description: 오늘 / 이번 주 / 이번 달 집중 시간 요약. 대시보드 상단 수치 표시용.
      security:
        - BearerAuth: []
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-06-10'
          description: 기준 날짜 (오늘)
      responses:
        '200':
          description: 요약 데이터 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  today:
                    type: object
                    properties:
                      total_focus_sec:
                        type: integer
                        example: 3600
                      completed_sessions:
                        type: integer
                        example: 2
                      completed_todos:
                        type: integer
                        example: 3
                  week:
                    type: object
                    properties:
                      total_focus_sec:
                        type: integer
                        example: 25200
                      completed_sessions:
                        type: integer
                        example: 14
                  month:
                    type: object
                    properties:
                      total_focus_sec:
                        type: integer
                        example: 108000
                      completed_sessions:
                        type: integer
                        example: 60
              example:
                today:
                  total_focus_sec: 3600
                  completed_sessions: 2
                  completed_todos: 3
                week:
                  total_focus_sec: 25200
                  completed_sessions: 14
                month:
                  total_focus_sec: 108000
                  completed_sessions: 60
        '401':
          $ref: '#/components/responses/Unauthorized'

  /stats/chart:
    get:
      tags: [Stats]
      summary: 주/월간 차트 데이터 조회
      description: 주간 또는 월간 집중 시간 바 차트 데이터 조회.
      security:
        - BearerAuth: []
      parameters:
        - name: period
          in: query
          required: true
          schema:
            type: string
            enum: [week, month]
          example: week
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-06-10'
          description: 기준 날짜
      responses:
        '200':
          description: 차트 데이터 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: string
                    example: week
                  start_date:
                    type: string
                    format: date
                    example: '2026-06-08'
                  end_date:
                    type: string
                    format: date
                    example: '2026-06-14'
                  labels:
                    type: array
                    items:
                      type: string
                    example: [월, 화, 수, 목, 금, 토, 일]
                  data:
                    type: array
                    items:
                      type: integer
                    example: [3600, 5400, 7200, 1800, 4500, 0, 2700]
              examples:
                week:
                  summary: 주간 조회
                  value:
                    period: week
                    start_date: '2026-06-08'
                    end_date: '2026-06-14'
                    labels: [월, 화, 수, 목, 금, 토, 일]
                    data: [3600, 5400, 7200, 1800, 4500, 0, 2700]
                month:
                  summary: 월간 조회
                  value:
                    period: month
                    start_date: '2026-06-01'
                    end_date: '2026-06-30'
                    labels: ['1', '2', '3', '...', '30']
                    data: [5400, 3600, 0, '...', 7200]
        '400':
          description: period 값 오류 또는 날짜 형식 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: period는 week 또는 month여야 합니다.
                  field: period
        '401':
          $ref: '#/components/responses/Unauthorized'
